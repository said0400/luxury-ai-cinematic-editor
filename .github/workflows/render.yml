# التعديل الجديد لنسخة MoviePy 2.0+
from moviepy import VideoFileClip, AudioFileClip, TextClip, CompositeVideoClip, concatenate_videoclips
from moviepy.video.tools.subtitles import SubtitlesClip
import os

def render_video(downloaded_paths, voice_path, captions_path):
    try:
        audio = AudioFileClip(voice_path)
        
        # ملاحظة: في الإصدار 2.0 قد تحتاج لإرسال الخط ككائن أو مسار مباشر
        def generator(txt):
            return TextClip(
                text=txt,
                font="assets/fonts/Anton-Regular.ttf",
                font_size=70,
                color='white',
                stroke_color='black',
                stroke_width=1.5,
                method='caption',
                size=(1080 * 0.8, None)
            ).with_position(('center', 'center')) # استخدام with_position بدلاً من set_position

        clips = []
        for p in downloaded_paths:
            # استخدام with_effects أو التعديل المباشر حسب الحاجة
            clip = VideoFileClip(p).resized(height=1920) # resized بدلاً من resize
            w, h = clip.size
            clip = clip.cropped(x_center=w/2, width=1080) # cropped بدلاً من crop
            clips.append(clip)

        final_bg = concatenate_videoclips(clips, method="compose").subclipped(0, audio.duration)

        if os.path.exists(captions_path):
            subtitles = SubtitlesClip(captions_path, generator)
            final_bg = CompositeVideoClip([final_bg, subtitles])

        output_file = "output/final.mp4"
        final_bg = final_bg.with_audio(audio) # with_audio بدلاً من set_audio
        
        final_bg.write_videofile(
            output_file,
            fps=30,
            codec="libx264",
            audio_codec="aac"
        )
        
        return output_file
    except Exception as e:
        print(f"Error: {e}")
        return None
